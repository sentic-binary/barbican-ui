name: Release

on:
  release:
    types: [published]

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: sentic-binary/barbican-ui

jobs:
  # ── Gate: run tests before releasing ───────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest

      - name: Smoke test – application starts and serves /healthz
        env:
          OS_AUTH_URL: "http://keystone.test/v3"
          SECRET_KEY: "ci-test-secret-key-not-for-production"
          BARBICAN_ENDPOINT_AUTODISCOVERY: "false"
          OS_BARBICAN_ENDPOINT: "http://barbican.test"
          SESSION_COOKIE_SECURE: "false"
        run: |
          pip install gunicorn
          gunicorn "app:create_app()" --bind 127.0.0.1:8080 --workers 1 --timeout 10 &
          sleep 3
          curl -sf http://127.0.0.1:8080/healthz || (echo "Health check failed" && exit 1)
          kill %1

  # ── Build & push Docker image to GHCR ─────────────────────────────
  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${{ github.event.release.tag_name }}" | sed 's/VERSION=v/VERSION=/' >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=min
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.VERSION }}

  # ── Package & push Helm chart to GHCR (OCI) ───────────────────────
  helm:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${{ github.event.release.tag_name }}" | sed 's/VERSION=v/VERSION=/' >> "$GITHUB_OUTPUT"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.0

      - name: Log in to GHCR (Helm OCI)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Package chart
        run: |
          helm package helm/barbican-ui \
            --version "${{ steps.version.outputs.VERSION }}" \
            --app-version "${{ steps.version.outputs.VERSION }}"

      - name: Push chart to GHCR
        run: helm push barbican-ui-${{ steps.version.outputs.VERSION }}.tgz oci://${{ env.REGISTRY }}/sentic-binary/charts


