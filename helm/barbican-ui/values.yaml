# Barbican UI Helm Values
# ─────────────────────────────────────────────────────────────────────

replicaCount: 2

image:
  repository: ghcr.io/sentic-binary/barbican-ui
  # Tag is set automatically by CI from git tag. Override for manual deploys.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

# ── Application configuration ────────────────────────────────────────

config:
  # Non-sensitive values → stored in ConfigMap
  OS_AUTH_URL: "https://keystone.example.com/v3"
  OS_IDENTITY_API_VERSION: "3"
  OS_USER_DOMAIN_NAME: "Default"
  OS_PROJECT_DOMAIN_NAME: "Default"
  OS_REGION_NAME: ""
  OS_TENANT_NAME: ""
  OS_TENANT_ID: ""
  BARBICAN_ENDPOINT_AUTODISCOVERY: "true"
  OS_BARBICAN_ENDPOINT: ""
  OS_CACERT: ""
  SESSION_LIFETIME_SECONDS: "3600"
  SESSION_COOKIE_SECURE: "true"
  SESSION_BIND_IP: "true"
  CACHE_TTL_SECONDS: "300"
  CACHE_DIR: "/tmp/barbican-ui-cache"
  LOG_LEVEL: "INFO"
  FLASK_PORT: "8080"

secrets:
  # Sensitive values → stored in Kubernetes Secret
  # IMPORTANT: All replicas MUST share the same SECRET_KEY for sessions to work
  SECRET_KEY: "CHANGE-ME-TO-A-RANDOM-32-CHAR-STRING"

# ── Service ──────────────────────────────────────────────────────────

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

# ── Ingress ──────────────────────────────────────────────────────────

ingress:
  enabled: false
  className: "nginx"
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: barbican-ui.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: barbican-ui-tls
  #    hosts:
  #      - barbican-ui.example.com

# ── Resources ────────────────────────────────────────────────────────

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# ── Autoscaling ──────────────────────────────────────────────────────

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

# ── Probes ───────────────────────────────────────────────────────────

livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 15
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /readyz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3

# ── Pod settings ─────────────────────────────────────────────────────

nodeSelector: {}
tolerations: []
affinity: {}

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# ── Cache persistence (optional) ────────────────────────────────────
# Enable if you want cache to survive pod restarts.
# Each pod gets its own PVC (via volumeClaimTemplates-like approach).
persistence:
  enabled: false
  size: 1Gi
  storageClass: ""
  accessModes:
    - ReadWriteOnce

